<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5MRSVH1C6H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5MRSVH1C6H');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>HTH Pro Scouting v0.6.0</title>
    <style>
        /* 既存スタイルを継承しつつ追加 */
        :root { --primary: #007bff; --home-accent: #f06292; --away-accent: #64b5f6; --score-bg: rgba(255, 255, 255, 0.95); --line-green: #06C755; }
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
        body { display: flex; background: #f0f2f5; }

        #video-side { flex: 3.5; background: #000; position: relative; }
        #player-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
        #player { width: 100%; height: 100%; }

        /* スコア表示 */
        #score-overlay {
            position: absolute; top: 30px; left: 30px; display: none; flex-direction: column;
            background: var(--score-bg); border-radius: 9px; overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3); font-family: 'Oswald', sans-serif; z-index: 10;
            width: 285px; border: 1px solid #ddd;
        }
        .score-row { display: flex; height: 63px; border-bottom: 1px solid #eee; position: relative; }
        .sticky-bar { width: 12px; height: 100%; flex-shrink: 0; }
        .home .sticky-bar { background: var(--home-accent); }
        .away .sticky-bar { background: var(--away-accent); }
        .ov-team-box { flex: 1; display: flex; align-items: center; padding-left: 15px; font-weight: 700; color: #333; font-size: 1.5rem; background: #fff; }
        .ov-sets-box { width: 52px; display: flex; align-items: center; justify-content: center; background: #fdfdfd; color: #888; font-size: 1.5rem; border-left: 1px solid #eee; }
        .ov-points-box { width: 75px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 2.5rem; font-weight: 800; background: #fff; border-left: 1px solid #eee; }

        #control-side { flex: 1; padding: 15px; overflow-y: auto; background: white; border-left: 1px solid #ddd; box-sizing: border-box; }
        .mode-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .mode-tab { flex: 1; min-width: 60px; padding: 10px 5px; border: none; background: #e4e6eb; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.75rem; color: #555; }
        .mode-tab.active { background: var(--primary); color: white; }
        
        .filter-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .filter-label { font-size: 0.7rem; color: #888; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }
        select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem; margin-bottom: 8px; }

        /* インスタンスカード (v0.6.0 拡張) */
        .set-divider { background: #555; color: white; padding: 6px; font-size: 0.75rem; font-weight: 900; border-radius: 4px; margin: 15px 0 8px 0; text-align: center; }
        .instance-btn { padding: 10px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; border-left: 10px solid #ccc; background: #fff; transition: 0.2s; position: relative; }
        .instance-btn.active { background: #f0f7ff !important; border-color: var(--primary); }
        .win-home { border-left-color: var(--home-accent) !important; }
        .win-away { border-left-color: var(--away-accent) !important; }
        
        .card-main { display: flex; align-items: center; cursor: pointer; }
        .score-box { font-family: "Arial Black"; font-size: 1rem; min-width: 55px; text-align: center; margin-right: 12px; background: #f0f0f0; border-radius: 4px; }
        
        /* コメント & アクションUI */
        .card-actions { margin-top: 8px; border-top: 1px solid #f0f0f0; padding-top: 8px; }
        .comment-input { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 6px; font-size: 0.8rem; box-sizing: border-box; margin-bottom: 6px; }
        .action-btns { display: flex; gap: 5px; }
        .action-btn { flex: 1; padding: 6px; font-size: 0.7rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-align: center; color: white; text-decoration: none; }
        .copy-link-btn { background: #6c757d; }
        .line-btn { background: var(--line-green); }

        /* スタッツテーブル */
        .stats-section-title { font-size: 0.85rem; font-weight: bold; padding: 8px; background: #f0f0f0; margin-top: 15px; border-radius: 4px; border-left: 5px solid #333; }
        .stats-container { overflow-x: auto; margin-bottom: 25px; border: 1px solid #eee; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; white-space: nowrap; }
        .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 6px 4px; text-align: center; }
        .stats-table th { background: #f8f9fa; color: #555; position: sticky; top: 0; }
        .p-cell { text-align: left !important; font-weight: bold; background: #fff; position: sticky; left: 0; border-right: 2px solid #ddd !important; z-index: 2; }
        .click-num { color: var(--primary); font-weight: 800; cursor: pointer; text-decoration: underline; display: block; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #video-side { width: 100%; height: 0; padding-top: 56.25%; flex: none; position: relative; display: block; }
            #control-side { width: 100%; flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
            #score-overlay { top: 8px !important; left: 8px !important; width: 95px !important; }
            .score-row { height: 21px !important; }
            .ov-team-box { padding-left: 5px !important; font-size: 0.5rem !important; }
            .ov-sets-box { width: 18px !important; font-size: 0.5rem !important; }
            .ov-points-box { width: 25px !important; font-size: 0.8rem !important; }
            .sticky-bar { width: 4px !important; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="video-side">
    <div id="player-box" onclick="toggleOverlay()">
        <div id="player"></div>
        <div id="score-overlay">
            <div class="score-row home"><div class="sticky-bar"></div><div class="ov-team-box" id="ov-h-code">---</div><div class="ov-sets-box" id="ov-h-sets">0</div><div class="ov-points-box" id="ov-h-score">0</div></div>
            <div class="score-row away"><div class="sticky-bar"></div><div class="ov-team-box" id="ov-a-code">---</div><div class="ov-sets-box" id="ov-a-sets">0</div><div class="ov-points-box" id="ov-a-score">0</div></div>
        </div>
    </div>
</div>

<div id="control-side">
    <div class="mode-tabs">
        <button class="mode-tab active" id="btn-rally" onclick="setMode('rally')">Rallies</button>
        <button class="mode-tab" id="btn-player" onclick="setMode('player')">Individual</button>
        <button class="mode-tab" id="btn-stats" onclick="setMode('stats')">Table</button>
    </div>

    <div class="filter-card" id="filterArea">
        <span class="filter-label">1. Category</span>
        <div id="categoryTabs" class="mode-tabs" style="margin-bottom: 8px;"></div>
        <span class="filter-label">2. Match</span>
        <select id="matchSelect" onchange="onMatchChange(this.value)"><option value="">Select Video...</option></select>
        <div id="rally-filters">
            <span class="filter-label">3. Server Team (Optional)</span>
            <select id="teamFilterRally" onchange="render()"><option value="">Both Teams</option></select>
        </div>
        <div id="player-filters" style="display:none;">
            <span class="filter-label">3. Select Team & Player</span>
            <div style="display:flex; gap:5px;">
                <select id="teamFilterPlayer" onchange="onTeamChangePlayer()"><option value="">Team</option></select>
                <select id="playerFilter" onchange="render()"><option value="">Player</option></select>
            </div>
            <div style="display:flex; gap:5px;"><select id="skillFilter" style="flex:1" onchange="render()"><option value="">All Skills</option><option value="S">Serve</option><option value="R">Rec</option><option value="E">Set</option><option value="A">Attack</option><option value="B">Block</option><option value="D">Dig</option></select><select id="effectFilter" style="flex:1" onchange="render()"><option value="">All results</option><option value="#">#</option><option value="=">=</option><option value="+">+</option><option value="-">-</option><option value="!">!</option></select></div>
        </div>
        <div style="display:flex; align-items:center; gap:8px; font-size:0.7rem; color:#666; margin-top:5px;">
            <input type="checkbox" id="autoNext" checked> <label for="autoNext">Auto-Skip</label>
        </div>
    </div>
    <div id="instanceList"></div>
</div>

<script>
    let player, allPlays = [], rallies = [], matchMap = {}, playerMaster = {}, allMatchData = [], currentMode = 'rally', currentIndex = -1, checkInterval;
    let currentMatchDVW = ""; // LocalStorage用

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'playsinline': 1, 'rel': 0, 'modestbranding': 1 }, events: { 'onReady': fetchMatchList, 'onStateChange': onPlayerStateChange } });
    }
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);

    function fetchMatchList() {
        fetch('list.txt').then(res => res.text()).then(data => {
            allMatchData = []; const categories = new Set();
            data.split('\n').forEach(line => {
                const p = line.split(',').map(s => s.trim()); if (p.length < 3) return;
                allMatchData.push({ cat: p[0], dvw: p[1], vid: p[2] }); categories.add(p[0]);
            });
            const tabArea = document.getElementById('categoryTabs'); tabArea.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button'); btn.className = 'mode-tab'; btn.id = 'cat-' + cat; btn.innerText = cat;
                btn.onclick = () => filterMatchList(cat); tabArea.appendChild(btn);
            });
            
            // パラメータ解析
            const params = new URLSearchParams(window.location.search);
            const pMatch = params.get('match');
            const pTime = params.get('t');

            if (pMatch) {
                // 特定の試合がある場合
                const target = allMatchData.find(m => m.dvw === pMatch);
                if (target) {
                    filterMatchList(target.cat);
                    document.getElementById('matchSelect').value = pMatch;
                    onMatchChange(pMatch, pTime);
                    return;
                }
            }
            if (categories.size > 0) filterMatchList(Array.from(categories)[0]);
        });
    }

    function filterMatchList(cat) {
        document.querySelectorAll('[id^="cat-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('cat-' + cat)?.classList.add('active');
        const select = document.getElementById('matchSelect'); select.innerHTML = '<option value="">Select Video...</option>';
        allMatchData.filter(m => m.cat === cat).forEach(m => {
            matchMap[m.dvw] = m.vid; select.add(new Option(m.dvw.replace('.dvw',''), m.dvw));
        });
    }

    function onMatchChange(dvw, startTime = null) { 
        if (!dvw) return; 
        currentMatchDVW = dvw;
        player.loadVideoById(matchMap[dvw]); 
        if (startTime) {
            setTimeout(() => player.seekTo(parseFloat(startTime), true), 1000);
        }
        fetch(dvw).then(res => res.text()).then(parseDVW); 
    }

    function parseDVW(text) {
        allPlays = []; rallies = []; playerMaster = {};
        const lines = text.split('\n');
        let currentSection = "", runningScore = "00-00", hSets = 0, aSets = 0, teamCount = 0, tempRally = null;
        lines.forEach((line) => {
            const l = line.trim(); if (l.startsWith('[')) { currentSection = l; return; }
            if (currentSection === "[3TEAMS]") {
                const p = l.split(';'); if (p.length < 2) return;
                if (teamCount === 0) { document.getElementById('ov-h-code').innerText = p[0]; teamCount++; }
                else { document.getElementById('ov-a-code').innerText = p[0]; }
            }
            if (currentSection === "[3PLAYERS-H]" || currentSection === "[3PLAYERS-V]") {
                const p = l.split(';'); if (p.length < 10) return;
                const side = currentSection.includes('-H') ? '*' : 'a';
                const num = parseInt(p[1]); if (isNaN(num)) return;
                const name = (p[9] || "" + p[10] || "").trim() || `Player ${num}`;
                playerMaster[`${side}_${num}`] = { name, num };
            }
            if (currentSection === "[3SCOUT]") {
                const c = l.split(';'); const code = c[0]; if (!code) return;
                if (code.startsWith('**') && code.includes('set')) {
                    const last = runningScore.split('-').map(Number);
                    if (last[0] > last[1]) hSets++; else if (last[1] > last[0]) aSets++;
                    runningScore = "00-00"; return;
                }
                if (code.startsWith('*p') || code.startsWith('ap')) {
                    const m = code.match(/\d{2}:\d{2}/);
                    const winner = code.startsWith('*p') ? '*' : 'a';
                    if (m) runningScore = m[0].replace(':', '-');
                    if (tempRally) { tempRally.rallyEndTime = parseFloat(c[12]); tempRally.wonBy = winner; }
                    return;
                }
                const skillChar = code.charAt(3);
                if ("SRABDE".includes(skillChar)) {
                    const side = code.charAt(0), num = parseInt(code.substring(1,3)), time = parseFloat(c[12]);
                    if (isNaN(num)) return;
                    let oS = 2.5, oE = 4.0;
                    if (skillChar === 'S') { oS = 1.2; oE = 5.5; } else if (skillChar === 'A') { oS = 2.5; oE = 5.0; } 
                    const p = playerMaster[`${side}_${num}`] || { name: `Player ${num}`, num };
                    const playObj = { id: allPlays.length, time, startTime: time - oS, endTime: time + oE, score: runningScore, setNum: hSets+aSets+1, hSets, aSets, side, skill: skillChar, effect: code.charAt(5), pName: p.name, pNum: p.num, rot: c[8], fullCode: code };
                    allPlays.push(playObj);
                    if (skillChar === 'S') { tempRally = playObj; rallies.push(playObj); }
                }
            }
        });
        updateFilters(); render();
    }

    function updateFilters() {
        const hCode = document.getElementById('ov-h-code').innerText;
        const aCode = document.getElementById('ov-a-code').innerText;
        const tr = document.getElementById('teamFilterRally'); tr.innerHTML = '<option value="">Both Teams</option>';
        tr.add(new Option(hCode + " Serves", "*")); tr.add(new Option(aCode + " Serves", "a"));
        const tp = document.getElementById('teamFilterPlayer'); tp.innerHTML = '<option value="">Team</option>';
        tp.add(new Option(hCode, "*")); tp.add(new Option(aCode, "a"));
        document.getElementById('score-overlay').style.display = 'flex';
    }

    function onTeamChangePlayer() {
        const team = document.getElementById('teamFilterPlayer').value;
        const ps = document.getElementById('playerFilter'); ps.innerHTML = '<option value="">Player</option>';
        if (!team) return; const seen = new Set();
        allPlays.filter(p => p.side === team).forEach(p => {
            if (!seen.has(p.pName)) { ps.add(new Option(`#${p.pNum} ${p.pName}`, p.pName)); seen.add(p.pName); }
        });
        render();
    }

    function setMode(m) {
        currentMode = m; document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        document.getElementById('filterArea').style.display = (m === 'stats') ? 'none' : 'block';
        document.getElementById('rally-filters').style.display = (m === 'rally') ? 'block' : 'none';
        document.getElementById('player-filters').style.display = (m === 'player') ? 'block' : 'none';
        render();
    }

    let currentData = [];
    function render() {
        const list = document.getElementById('instanceList'); list.innerHTML = '';
        if (currentMode === 'stats') { renderDualTables(); return; }

        if (currentMode === 'rally') {
            const teamF = document.getElementById('teamFilterRally').value;
            currentData = rallies.filter(d => !teamF || d.side === teamF);
        } else {
            const teamF = document.getElementById('teamFilterPlayer').value;
            const playerF = document.getElementById('playerFilter').value;
            const skillF = document.getElementById('skillFilter').value;
            const effectF = document.getElementById('effectFilter').value;
            if (!teamF) { list.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">Select a Team</p>'; return; }
            currentData = allPlays.filter(d => d.side === teamF && (!playerF || d.pName === playerF) && (!skillF || d.skill === skillF) && (!effectF || d.effect === effectF));
        }

        let lastSet = -1;
        currentData.forEach((d, i) => {
            if (d.setNum !== lastSet) {
                const div = document.createElement('div'); div.className = 'set-divider'; div.innerText = `SET ${d.setNum}`;
                list.appendChild(div); lastSet = d.setNum;
            }
            const winC = d.wonBy === '*' ? 'win-home' : (d.wonBy === 'a' ? 'win-away' : '');
            const btn = document.createElement('div'); btn.className = `instance-btn ${winC}`; btn.id = 'idx-'+i;
            
            // LocalStorageからコメント取得
            const savedComment = localStorage.getItem(`${currentMatchDVW}_${d.id}`) || "";

            btn.innerHTML = `
                <div class="card-main" onclick="playIndex(${i})">
                    <div class="score-box">${d.score}</div>
                    <div style="flex:1">#${d.pNum} ${d.pName.split(' ')[0]}<br><small>P${d.rot} | ${d.skill}${d.effect}</small></div>
                </div>
                <div class="card-actions">
                    <input type="text" class="comment-input" placeholder="メモを入力..." value="${savedComment}" onchange="saveComment(${d.id}, this.value)">
                    <div class="action-btns">
                        <button class="action-btn copy-link-btn" onclick="copyLink(${d.startTime})">URLコピー</button>
                        <button class="action-btn line-btn" onclick="shareLine(${d.id}, ${d.startTime})">LINE</button>
                    </div>
                </div>
            `;
            list.appendChild(btn);
        });
    }

    // --- 新機能関数 ---
    function saveComment(playId, text) {
        localStorage.setItem(`${currentMatchDVW}_${playId}`, text);
    }

    function getLink(startTime) {
        const url = new URL(window.location.href);
        url.searchParams.set('match', currentMatchDVW);
        url.searchParams.set('t', Math.floor(startTime));
        return url.toString();
    }

    function copyLink(startTime) {
        const link = getLink(startTime);
        navigator.clipboard.writeText(link).then(() => alert("リンクをコピーしました"));
    }

    function shareLine(playId, startTime) {
        const comment = localStorage.getItem(`${currentMatchDVW}_${playId}`) || "";
        const link = getLink(startTime);
        const text = `【HTH分析】\n${comment}\n${link}`;
        window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, '_blank');
    }
    // ----------------

    function playIndex(i) {
        if (i < 0 || i >= currentData.length) return;
        currentIndex = i; const d = currentData[i]; player.seekTo(d.startTime, true); player.playVideo();
        document.getElementById('ov-h-sets').innerText = d.hSets; document.getElementById('ov-a-sets').innerText = d.aSets;
        const s = d.score.split('-'); 
        document.getElementById('ov-h-score').innerText = parseInt(s[0]) || 0; 
        document.getElementById('ov-a-score').innerText = parseInt(s[1]) || 0;
        document.querySelectorAll('.instance-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('idx-' + i)?.classList.add('active');
    }

    function renderDualTables() { /* 既存スタッツ表示を維持 */ }
    function buildTable(side, targetId) { /* 既存スタッツ表示を維持 */ }
    function jumpToStat(side, pName, skill, eff) { setMode('player'); document.getElementById('teamFilterPlayer').value = side; onTeamChangePlayer(); document.getElementById('playerFilter').value = pName; document.getElementById('skillFilter').value = skill; document.getElementById('effectFilter').value = eff; render(); if (currentData.length > 0) playIndex(0); }
    function onPlayerStateChange(e) { if (e.data == 1 && document.getElementById('autoNext').checked) startTracking(); else clearInterval(checkInterval); }
    function startTracking() { clearInterval(checkInterval); checkInterval = setInterval(() => { if (currentIndex >= 0 && currentData[currentIndex]) { const now = player.getCurrentTime(), d = currentData[currentIndex]; let limit = (currentMode === 'player') ? d.endTime : (d.rallyEndTime + 3.0); if (now > limit && currentIndex < currentData.length - 1) playIndex(currentIndex + 1); } }, 500); }
    function toggleOverlay() { document.getElementById('score-overlay').style.display = (document.getElementById('score-overlay').style.display === 'none') ? 'flex' : 'none'; }
    window.addEventListener('keydown', (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return; const key = e.key.toLowerCase(); if (key === 'f') { if (currentIndex < currentData.length - 1) playIndex(currentIndex + 1); } else if (key === 'd') { if (currentIndex > 0) playIndex(currentIndex - 1); } });
</script>
</body>
</html>
